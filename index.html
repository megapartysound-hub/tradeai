<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TradeAI PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0c0f1a;
    color: white;
}

header {
    background: #12162a;
    padding: 10px;
    display: flex;
    justify-content: space-between;
}

select {
    padding: 5px;
}

#chart {
    height: 500px;
}

.card {
    background: #1a1f3a;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
}

.green { color: #00ff9c; }
.red { color: #ff4d4d; }
</style>
</head>

<body>

<header>
    <h2>TradeAI PRO</h2>

    <select id="aiSelector">
        <option value="basic">IA Básica</option>
        <option value="pro">IA PRO</option>
        <option value="gpt">ChatGPT</option>
    </select>
</header>

<div class="card">
    <input id="symbolInput" placeholder="Ej: AAPL, TSLA, GGAL, IMV">
    <button onclick="loadSymbol()">Cargar</button>
</div>

<div id="chart"></div>

<div class="card">
    RSI: <span id="rsi">Calculando...</span>
</div>

<div class="card">
    Señal: <span id="signal">Esperando datos...</span>
</div>

<!-- TradingView -->
<script src="https://s3.tradingview.com/tv.js"></script>

<script>

let currentSymbol = "AAPL";

// 🔥 DETECCIÓN AUTOMÁTICA DE EXCHANGE
function resolveSymbol(symbol) {
    symbol = symbol.toUpperCase();

    if(symbol.endsWith(".BA")) return symbol;

    // Acciones argentinas fallback
    const argentinaList = ["GGAL","YPF","PAMP","TXAR","ALUA","BBAR","LOMA","SUPV","CEPU","COME","IMV"];

    if(argentinaList.includes(symbol)) {
        return "BCBA:" + symbol;
    }

    return symbol;
}

// 🔥 CARGAR GRÁFICO (ROBUSTO)
function loadTradingView(symbol) {

    document.getElementById("chart").innerHTML = "";

    new TradingView.widget({
        "container_id": "chart",
        "symbol": symbol,
        "interval": "5",
        "theme": "dark",
        "style": "1",
        "locale": "es",
        "toolbar_bg": "#12162a",
        "enable_publishing": false,
        "hide_side_toolbar": false,
        "allow_symbol_change": true
    });
}

// 🔥 RSI RÁPIDO (SIMULACIÓN PROVISORIA MEJORADA)
function calculateRSI() {
    let rsi = Math.floor(Math.random() * 100);

    document.getElementById("rsi").innerText = rsi;

    if(rsi > 70) {
        document.getElementById("signal").innerHTML = "<span class='red'>Sobrecompra</span>";
    } else if(rsi < 30) {
        document.getElementById("signal").innerHTML = "<span class='green'>Sobreventa</span>";
    } else {
        document.getElementById("signal").innerText = "Neutro";
    }
}

// 🔥 MOTOR PRINCIPAL
function loadSymbol() {

    let input = document.getElementById("symbolInput").value;
    let resolved = resolveSymbol(input);

    currentSymbol = resolved;

    loadTradingView(resolved);

    document.getElementById("rsi").innerText = "Calculando...";
    document.getElementById("signal").innerText = "Analizando...";

    // Simula tiempo real
    setInterval(() => {
        calculateRSI();
    }, 2000);
}

// INIT
loadTradingView(currentSymbol);

</script>

</body>
</html>
